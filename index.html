<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUSA-PROJECT — P2P Encrypted Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2035;--surface:#1e2a40;--surface2:#243048;--border:#2a3a5c;--accent:#00f5ff;--accent2:#ff00ff;--accent3:#00ff88;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--danger:#ff4d6d;--success:#06d6a0;--radius:12px;--shadow:0 0 20px rgba(0,245,255,.15);--glow:0 0 30px rgba(0,245,255,.3);--mono:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif;--body:'Inter',sans-serif;}
[data-theme=light]{--bg:#f0f4f8;--bg2:#e2e8f0;--bg3:#cbd5e1;--surface:#fff;--surface2:#f8fafc;--border:#cbd5e1;--accent:#0066cc;--accent2:#9333ea;--accent3:#059669;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--shadow:0 4px 20px rgba(0,0,0,.1);--glow:0 4px 20px rgba(0,102,204,.2);}
[data-theme=neon]{--bg:#000;--bg2:#050505;--bg3:#0a0a0a;--surface:#0d0d0d;--surface2:#111;--border:#1a1a1a;--accent:#39ff14;--accent2:#ff073a;--accent3:#ff6600;--text:#39ff14;--text2:#00ff88;--text3:#1a5c1a;--shadow:0 0 30px rgba(57,255,20,.2);--glow:0 0 50px rgba(57,255,20,.4);}
[data-theme=purple]{--bg:#0d0010;--bg2:#150020;--bg3:#1c0030;--surface:#200040;--surface2:#280050;--border:#3d0075;--accent:#bf00ff;--accent2:#ff00aa;--accent3:#7700ff;--text:#f0d0ff;--text2:#c090e0;--text3:#7050a0;--shadow:0 0 30px rgba(191,0,255,.2);--glow:0 0 50px rgba(191,0,255,.4);}

*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.18;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;}

/* LOBBY */
#lobby{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:1.75rem;}
.logo h1{font-family:var(--ui);font-size:clamp(2.5rem,8vw,5rem);font-weight:700;letter-spacing:.2em;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px var(--accent));animation:glow 3s ease-in-out infinite alternate;text-align:center;}
.logo p{font-family:var(--mono);font-size:.8rem;color:var(--text2);margin-top:.5rem;text-align:center;}
@keyframes glow{from{filter:drop-shadow(0 0 15px var(--accent));}to{filter:drop-shadow(0 0 35px var(--accent2));}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:480px;box-shadow:var(--shadow);}
.fg{margin-bottom:1.2rem;}
.fg label{display:block;font-family:var(--ui);font-size:.7rem;font-weight:600;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;margin-bottom:.45rem;}
.fg label span{color:var(--danger);}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;color:var(--text);font-family:var(--mono);font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp::placeholder{color:var(--text3);}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,245,255,.08);}
.btn{width:100%;padding:.82rem 1.5rem;border:none;border-radius:8px;font-family:var(--ui);font-size:.95rem;font-weight:700;letter-spacing:.12em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;text-transform:uppercase;}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
.btn-p:hover{opacity:.9;transform:translateY(-1px);box-shadow:var(--glow);}
.btn-s{background:transparent;border:1px solid var(--accent);color:var(--accent);}
.btn-s:hover{background:rgba(0,245,255,.07);}
.div{display:flex;align-items:center;gap:1rem;color:var(--text3);font-size:.75rem;font-family:var(--mono);margin:1.15rem 0;}
.div::before,.div::after{content:'';flex:1;height:1px;background:var(--border);}
.tbar{display:flex;gap:.45rem;justify-content:center;flex-wrap:wrap;}
.tb{padding:.36rem .88rem;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:var(--ui);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;}
.tb:hover,.tb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,245,255,.07);}

/* ROOM */
#room{display:none;height:100vh;flex-direction:column;}
#room.active{display:flex;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;gap:.7rem;flex-shrink:0;}
.hdr-logo{font-family:var(--ui);font-weight:700;font-size:1.05rem;color:var(--accent);letter-spacing:.1em;filter:drop-shadow(0 0 6px var(--accent));}
.hdr-info{flex:1;min-width:0;}
.hdr-room{font-family:var(--mono);font-size:.76rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-peers{font-size:.66rem;color:var(--text3);font-family:var(--mono);}
.hdr-actions{display:flex;gap:.3rem;}
.ib{width:33px;height:33px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s;}
.ib:hover{border-color:var(--accent);color:var(--accent);}
.ib.red:hover{border-color:var(--danger);color:var(--danger);}

/* LAYOUT */
.rbody{display:flex;flex:1;overflow:hidden;}
.sb{width:248px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .28s;}
.sb.col{width:0;overflow:hidden;}
.sbs{padding:.85rem;border-bottom:1px solid var(--border);}
.sbl{font-family:var(--ui);font-size:.67rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);margin-bottom:.65rem;}
#qrbox canvas{border-radius:8px;display:block;margin:0 auto;max-width:155px;}
.codedisp{font-family:var(--mono);font-size:.62rem;color:var(--accent);text-align:center;margin-top:.45rem;word-break:break-all;cursor:pointer;padding:.32rem;border-radius:6px;border:1px dashed var(--border);transition:all .2s;}
.codedisp:hover{border-color:var(--accent);background:rgba(0,245,255,.05);}
#plist{display:flex;flex-direction:column;gap:.3rem;}
.pi{display:flex;align-items:center;gap:.48rem;padding:.38rem .5rem;border-radius:8px;background:var(--surface2);}
.pav{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;font-family:var(--ui);flex-shrink:0;}
.pnm{font-size:.75rem;color:var(--text);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--success);margin-left:auto;flex-shrink:0;}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem;}
.to{padding:.42rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-family:var(--ui);font-size:.7rem;font-weight:600;color:var(--text2);text-align:center;transition:all .2s;}
.to:hover,.to.on{border-color:var(--accent);color:var(--accent);}

/* CHAT */
.ca{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.4rem;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:4px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.msg{max-width:74%;padding:.58rem .82rem;border-radius:12px;font-size:.87rem;line-height:1.55;word-break:break-word;animation:mi .16s ease;}
@keyframes mi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.msg.own{align-self:flex-end;background:linear-gradient(135deg,rgba(0,245,255,.12),rgba(255,0,255,.07));border:1px solid rgba(0,245,255,.2);border-bottom-right-radius:4px;}
.msg.other{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg.sys{align-self:center;background:transparent;border:none;font-size:.7rem;color:var(--text3);font-family:var(--mono);padding:.18rem .45rem;}
.msnd{font-size:.67rem;font-weight:600;font-family:var(--ui);margin-bottom:.15rem;color:var(--accent);}
.msg.own .msnd{color:var(--accent2);}
.mt{font-size:.6rem;color:var(--text3);font-family:var(--mono);margin-top:.26rem;text-align:right;}
.mreply{background:rgba(0,0,0,.2);border-left:3px solid var(--accent);border-radius:6px;padding:.32rem .52rem;margin-bottom:.35rem;font-size:.72rem;color:var(--text2);}
.mreply strong{color:var(--accent);display:block;font-size:.65rem;margin-bottom:.1rem;}
.msg a{color:var(--accent);text-decoration:underline;}
.mimg{max-width:255px;max-height:195px;border-radius:8px;cursor:pointer;display:block;margin-top:.25rem;object-fit:cover;transition:transform .18s;}
.mimg:hover{transform:scale(1.02);}
.mfile{display:flex;align-items:center;gap:.5rem;background:rgba(0,0,0,.18);border-radius:8px;padding:.5rem .7rem;text-decoration:none;color:var(--text);margin-top:.25rem;transition:background .2s;}
.mfile:hover{background:rgba(0,245,255,.07);}
.mfic{font-size:1.3rem;}
.mfi{flex:1;min-width:0;}
.mfn{font-size:.76rem;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mfs{font-size:.66rem;color:var(--text3);}
.memoji{font-size:1.85rem;line-height:1.2;}

/* REPLY BAR */
.rbar{background:var(--surface2);border-top:1px solid var(--border);padding:.42rem 1rem;display:none;align-items:center;gap:.65rem;}
.rbar.on{display:flex;}
.rbc{flex:1;font-size:.76rem;color:var(--text2);}
.rbc strong{color:var(--accent);display:block;font-size:.66rem;margin-bottom:.07rem;}
.rc{cursor:pointer;color:var(--text3);font-size:.95rem;transition:color .15s;}
.rc:hover{color:var(--danger);}

/* INPUT AREA */
.ia{background:var(--surface);border-top:1px solid var(--border);padding:.65rem 1rem;flex-shrink:0;}
.ir{display:flex;gap:.42rem;align-items:flex-end;}
.fab{flex-shrink:0;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;}
.fab:hover{border-color:var(--accent);color:var(--accent);}
.mi2{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.56rem .85rem;color:var(--text);font-family:var(--body);font-size:.87rem;outline:none;resize:none;max-height:140px;min-height:36px;line-height:1.5;transition:border-color .2s;}
.mi2::placeholder{color:var(--text3);}
.mi2:focus{border-color:var(--accent);}
.sb2{flex-shrink:0;width:36px;height:36px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;}
.sb2:hover{opacity:.85;transform:scale(1.05);}

/* TYPING */
.typ{align-self:flex-start;display:flex;gap:4px;padding:.5rem .75rem;background:var(--surface2);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:4px;}
.td{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:tb2 1.2s infinite;}
.td:nth-child(2){animation-delay:.2s;}.td:nth-child(3){animation-delay:.4s;}
@keyframes tb2{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-5px);opacity:1;}}

/* CALL */
#cov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;backdrop-filter:blur(8px);}
#cov.on{display:flex;}
.cbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;text-align:center;width:100%;max-width:560px;}
.cvids{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem;}
.cvids video{width:100%;aspect-ratio:4/3;background:#000;border-radius:10px;object-fit:cover;border:1px solid var(--border);}
.cst{font-family:var(--mono);color:var(--text2);font-size:.86rem;margin-bottom:1rem;}
.cct{display:flex;gap:.9rem;justify-content:center;}
.cb{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s;}
.cb.end{background:var(--danger);color:#fff;}.cb.end:hover{transform:scale(1.08);}
.cb.tog{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.cb.tog:hover{border-color:var(--accent);color:var(--accent);}
.cb.tog.mut{background:rgba(255,77,109,.15);border-color:var(--danger);color:var(--danger);}

/* INCOMING */
.ic{display:none;position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--accent);border-radius:14px;padding:1.2rem 1.35rem;z-index:200;box-shadow:var(--glow);animation:si .28s ease;min-width:240px;}
.ic.on{display:block;}
@keyframes si{from{transform:translateX(120%);}to{transform:none;}}
.ic h4{font-family:var(--ui);color:var(--text);margin-bottom:.22rem;font-size:.92rem;}
.ic p{font-size:.76rem;color:var(--text2);font-family:var(--mono);margin-bottom:.85rem;}
.ibs{display:flex;gap:.6rem;}
.ibs button{flex:1;padding:.45rem;border-radius:8px;border:none;font-family:var(--ui);font-weight:600;cursor:pointer;font-size:.8rem;transition:opacity .15s;}
.ibs button:hover{opacity:.85;}
.bacc{background:var(--success);color:#000;}
.bdec{background:var(--danger);color:#fff;}

/* IMG VIEWER */
#iv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:500;align-items:center;justify-content:center;cursor:zoom-out;}
#iv.on{display:flex;}
#iv img{max-width:95vw;max-height:95vh;border-radius:8px;object-fit:contain;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.52rem 1.15rem;font-family:var(--mono);font-size:.76rem;color:var(--text);z-index:1000;opacity:0;transition:all .28s;white-space:nowrap;pointer-events:none;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:640px){.sb{display:none;}.sb.mob{display:flex;position:fixed;inset:0;z-index:50;width:255px;}.msg{max-width:88%;}.cvids{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <h1>NUSA-PROJECT</h1>
    <p>Peer-to-Peer Encrypted Chat &bull; No Server &bull; No Database</p>
  </div>
  <div class="card">
    <div class="fg">
      <label>Nickname <span>*</span></label>
      <input id="ni" class="inp" type="text" placeholder="Anonymous_Hacker" maxlength="32">
    </div>
    <button class="btn btn-p" id="bcreate">&#xFF0B; Create Room</button>
    <div class="div">OR</div>
    <div class="fg">
      <label>Room Code</label>
      <input id="ji" class="inp" type="text" placeholder="Paste room ID to join...">
    </div>
    <button class="btn btn-s" id="bjoin">&#x2192; Join Room</button>
    <div class="div">Theme</div>
    <div class="tbar">
      <button class="tb on" data-t="dark">&#x25CF; Dark</button>
      <button class="tb" data-t="light">&#x25CB; Light</button>
      <button class="tb" data-t="neon">&#x26A1; Neon</button>
      <button class="tb" data-t="purple">&#x2726; Purple</button>
    </div>
  </div>
  <p style="font-family:var(--mono);font-size:.65rem;color:var(--text3);text-align:center;">End-to-end encrypted &bull; No accounts &bull; No storage</p>
</div>

<!-- ROOM -->
<div id="room">
  <div class="hdr">
    <div class="hdr-logo">NUSA</div>
    <div class="hdr-info">
      <div class="hdr-room" id="hdrid">Room: —</div>
      <div class="hdr-peers" id="hdrp">0 peers</div>
    </div>
    <div class="hdr-actions">
      <button class="ib" id="bsb" title="Sidebar">&#x2261;</button>
      <button class="ib" id="bvc" title="Voice Call">&#x1F3A4;</button>
      <button class="ib" id="bvd" title="Video Call">&#x1F4F9;</button>
      <button class="ib" id="bsh" title="Share">&#x1F517;</button>
      <button class="ib red" id="blv" title="Leave">&#x23FB;</button>
    </div>
  </div>
  <div class="rbody">
    <div class="sb" id="sb">
      <div class="sbs">
        <div class="sbl">QR Join</div>
        <div id="qrbox"></div>
        <div class="codedisp" id="cdsp"></div>
      </div>
      <div class="sbs">
        <div class="sbl">Peers</div>
        <div id="plist"></div>
      </div>
      <div class="sbs">
        <div class="sbl">Theme</div>
        <div class="tgrid">
          <div class="to on" data-t="dark">&#x25CF; Dark</div>
          <div class="to" data-t="light">&#x25CB; Light</div>
          <div class="to" data-t="neon">&#x26A1; Neon</div>
          <div class="to" data-t="purple">&#x2726; Purple</div>
        </div>
      </div>
    </div>
    <div class="ca">
      <div class="msgs" id="msgs"></div>
      <div class="rbar" id="rbar">
        <div style="color:var(--accent)">&#x21A9;</div>
        <div class="rbc"><strong id="rsnd"></strong><span id="rtxt"></span></div>
        <span class="rc" id="rcancel">&#x2715;</span>
      </div>
      <div class="ia">
        <div class="ir">
          <button class="fab" id="batt">&#x1F4CE;</button>
          <input type="file" id="finp" style="display:none" multiple>
          <textarea class="mi2" id="minp" placeholder="Message... (Shift+Enter = new line)" rows="1"></textarea>
          <button class="sb2" id="bsend">&#x27A4;</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CALL OVERLAY -->
<div id="cov">
  <div class="cbox">
    <div class="cvids" id="cvids" style="display:none">
      <video id="vloc" autoplay muted playsinline></video>
      <video id="vrem" autoplay playsinline></video>
    </div>
    <div class="cst" id="cst">Connecting...</div>
    <div class="cct">
      <button class="cb tog" id="bmut">&#x1F3A4;</button>
      <button class="cb tog" id="bcam" style="display:none">&#x1F4F7;</button>
      <button class="cb end" id="bend">&#x260E;&#xFE0E;</button>
    </div>
  </div>
</div>

<!-- INCOMING CALL -->
<div class="ic" id="ic">
  <h4>&#x1F4DE; Incoming Call</h4>
  <p id="icnm">Unknown</p>
  <div class="ibs">
    <button class="bacc" id="bacc">&#x2713; Accept</button>
    <button class="bdec" id="bdec">&#x2715; Decline</button>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div id="iv"><img id="ivsrc" src="" alt=""></div>

<!-- TOAST -->
<div class="toast" id="tst"></div>

<script>
const S={peer:null,myId:null,myNick:'',conns:{},mcalls:{},peers:{},replyTo:null,roomId:null,isHost:false,localStream:null,isMuted:false,isCamOff:false,callType:null,pendingCall:null,typEl:null,typTmr:null};
const COLORS=['#00f5ff','#ff00ff','#00ff88','#ffd166','#ef476f','#06d6a0','#118ab2','#bf00ff'];
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const ft=ts=>new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const fsz=b=>b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';
const lfy=t=>t.replace(/(https?:\/\/[^\s<>"']+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
const fic=n=>{const e=n.split('.').pop().toLowerCase();if(['jpg','jpeg','png','gif','webp','svg'].includes(e))return'🖼️';if(['mp4','mov','avi','mkv','webm'].includes(e))return'🎬';if(['mp3','wav','ogg'].includes(e))return'🎵';if(e==='pdf')return'📄';if(['zip','rar','7z'].includes(e))return'📦';if(['doc','docx'].includes(e))return'📝';if(['xls','xlsx'].includes(e))return'📊';if(['js','ts','py','html','css','json'].includes(e))return'💻';return'📎';};
const scr=()=>{const m=$('msgs');requestAnimationFrame(()=>m.scrollTop=m.scrollHeight);};
function toast(m,d=2600){const t=$('tst');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),d);}

// THEME
function theme(t){document.documentElement.dataset.theme=t==='dark'?'':t;S.theme=t;localStorage.setItem('nt',t);document.querySelectorAll('[data-t]').forEach(e=>e.classList.toggle('on',e.dataset.t===t));if(S.roomId)setTimeout(()=>genQR(S.roomId),80);}
document.querySelectorAll('[data-t]').forEach(e=>e.addEventListener('click',()=>theme(e.dataset.t)));
theme(localStorage.getItem('nt')||'dark');

// PEER
function initPeer(cb){
  S.peer=new Peer(undefined,{host:'0.peerjs.com',port:443,secure:true,path:'/',config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  S.peer.on('open',id=>{S.myId=id;cb&&cb();});
  S.peer.on('connection',setupConn);
  S.peer.on('call',handleCall);
  S.peer.on('error',err=>{console.error(err);toast('Error: '+err.type);});
  S.peer.on('disconnected',()=>{try{S.peer.reconnect();}catch(e){}});
}
function setupConn(conn){
  conn.on('open',()=>{S.conns[conn.peer]=conn;send(conn,{type:'join',nick:S.myNick});});
  conn.on('data',raw=>{try{onData(conn.peer,JSON.parse(raw));}catch(e){console.error(e);}});
  conn.on('close',()=>{const n=S.peers[conn.peer]?.nick||'Peer';delete S.conns[conn.peer];delete S.peers[conn.peer];updPeers();sysMsg(n+' disconnected');});
  conn.on('error',console.error);
}
function send(conn,obj){if(conn?.open)conn.send(JSON.stringify(obj));}
function bcast(obj,ex){Object.entries(S.conns).forEach(([id,c])=>{if(id!==ex)send(c,obj);});}

// LOBBY
$('bcreate').onclick=()=>{S.myNick=$('ni').value.trim()||'Anon_'+gid().slice(0,5);S.isHost=true;initPeer(()=>{S.roomId=S.myId;enterRoom();});};
$('bjoin').onclick=()=>{const code=$('ji').value.trim();if(!code){toast('Enter a room code!');return;}S.myNick=$('ni').value.trim()||'Anon_'+gid().slice(0,5);initPeer(()=>{const c=S.peer.connect(code,{reliable:true,serialization:'raw'});setupConn(c);c.on('open',()=>{S.roomId=code;enterRoom();});});};
$('ni').addEventListener('keydown',e=>e.key==='Enter'&&$('bcreate').click());
$('ji').addEventListener('keydown',e=>e.key==='Enter'&&$('bjoin').click());

// ENTER ROOM
function enterRoom(){
  $('lobby').style.display='none';$('room').classList.add('active');
  $('hdrid').textContent='Room: '+S.roomId.slice(0,16)+'…';
  $('cdsp').textContent=S.roomId;
  genQR(S.roomId);
  S.peers[S.myId]={nick:S.myNick+' (you)',color:COLORS[0]};
  updPeers();
}
function genQR(text){
  const b=$('qrbox');b.innerHTML='';if(!text)return;
  const c=document.createElement('canvas');b.appendChild(c);
  const cs=getComputedStyle(document.documentElement);
  QRCode.toCanvas(c,text,{width:155,margin:1,color:{dark:cs.getPropertyValue('--text').trim()||'#e2e8f0',light:cs.getPropertyValue('--surface').trim()||'#1e2a40'}},err=>err&&console.error(err));
}
function updPeers(){
  const list=$('plist');list.innerHTML='';
  const cnt=Object.keys(S.conns).length;
  $('hdrp').textContent=cnt+' peer'+(cnt!==1?'s':'')+' connected';
  Object.entries(S.peers).forEach(([pid,info])=>{
    const el=document.createElement('div');el.className='pi';
    el.innerHTML='<div class="pav" style="background:'+info.color+'22;color:'+info.color+'">'+esc(info.nick.slice(0,2).toUpperCase())+'</div><div class="pnm">'+esc(info.nick)+'</div><div class="pdot"></div>';
    list.appendChild(el);
  });
}

// DATA HANDLER
function onData(fp,data){
  switch(data.type){
    case 'join':
      S.peers[fp]={nick:data.nick,color:COLORS[Object.keys(S.peers).length%COLORS.length]};
      updPeers();sysMsg(data.nick+' joined');bcast(data,fp);break;
    case 'chat': renderMsg(data,false);bcast(data,fp);break;
    case 'file': renderFile(data,false);bcast(data,fp);break;
    case 'typing': showTyping(data.nick);break;
    case 'call-req': break; // handled by peer.on('call')
    case 'call-declined': toast('Call declined');endCall();break;
  }
}

// RENDER MESSAGE
function renderMsg(msg,isOwn){
  const m=$('msgs'),el=document.createElement('div');
  el.className='msg '+(isOwn?'own':'other');
  el.dataset.id=msg.id;
  const onlyEmoji=/^[\p{Emoji}\s]{1,5}$/u.test(msg.text)&&msg.text.trim().length<=10;
  const body=onlyEmoji?'<div class="memoji">'+esc(msg.text)+'</div>':'<div>'+lfy(esc(msg.text))+'</div>';
  let rhtml='';
  if(msg.replyTo){const p=msg.replyTo.text.length>65?esc(msg.replyTo.text.slice(0,65))+'…':esc(msg.replyTo.text);rhtml='<div class="mreply"><strong>&#x21A9; '+esc(msg.replyTo.sender)+'</strong>'+p+'</div>';}
  const sndr=!isOwn?'<div class="msnd">'+esc(msg.nick)+'</div>':'';
  const st=isOwn?' <span style="color:var(--accent);font-size:.6rem">&#x2713;&#x2713;</span>':'';
  el.innerHTML=sndr+rhtml+body+'<div class="mt">'+ft(msg.time)+st+'</div>';
  el.addEventListener('contextmenu',e=>{e.preventDefault();setReply(msg);});
  el.addEventListener('dblclick',()=>setReply(msg));
  m.appendChild(el);scr();
}
function renderFile(msg,isOwn){
  const el=document.createElement('div');
  el.className='msg '+(isOwn?'own':'other');
  const isImg=msg.fileType?.startsWith('image/');
  const sndr=!isOwn?'<div class="msnd">'+esc(msg.nick)+'</div>':'';
  let content=isImg
    ?'<img class="mimg" src="'+msg.dataUrl+'" alt="'+esc(msg.fileName)+'" loading="lazy">'
    :'<a class="mfile" href="'+msg.dataUrl+'" download="'+esc(msg.fileName)+'">'
      +'<span class="mfic">'+fic(msg.fileName)+'</span>'
      +'<div class="mfi"><div class="mfn">'+esc(msg.fileName)+'</div><div class="mfs">'+fsz(msg.fileSize)+'</div></div>'
      +'<span>&#x2193;</span></a>';
  el.innerHTML=sndr+content+'<div class="mt">'+ft(msg.time)+'</div>';
  if(isImg){el.querySelector('.mimg')?.addEventListener('click',()=>{$('ivsrc').src=msg.dataUrl;$('iv').classList.add('on');});}
  $('msgs').appendChild(el);scr();
}
function sysMsg(t){const el=document.createElement('div');el.className='msg sys';el.textContent='— '+t+' —';$('msgs').appendChild(el);scr();}

// SEND
$('bsend').onclick=sendMsg;
$('minp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
$('minp').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,140)+'px';
  bcast({type:'typing',nick:S.myNick});
});
function sendMsg(){
  const inp=$('minp'),text=inp.value;
  if(!text.trim())return;
  const msg={type:'chat',id:gid(),nick:S.myNick,text,time:Date.now(),replyTo:S.replyTo};
  renderMsg(msg,true);bcast(msg);
  inp.value='';inp.style.height='auto';cancelReply();
}

// REPLY
function setReply(msg){
  S.replyTo={id:msg.id,sender:msg.nick||S.myNick,text:msg.text||'[file]'};
  $('rbar').classList.add('on');
  $('rsnd').textContent=S.replyTo.sender;
  $('rtxt').textContent=S.replyTo.text.slice(0,60);
  $('minp').focus();
}
function cancelReply(){S.replyTo=null;$('rbar').classList.remove('on');}
$('rcancel').onclick=cancelReply;

// FILE ATTACH
$('batt').onclick=()=>$('finp').click();
$('finp').addEventListener('change',async function(){
  for(const file of this.files){
    const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
    const msg={type:'file',id:gid(),nick:S.myNick,fileName:file.name,fileType:file.type,fileSize:file.size,dataUrl,time:Date.now()};
    renderFile(msg,true);bcast(msg);
  }
  this.value='';
});

// TYPING
function showTyping(nick){
  clearTimeout(S.typTmr);
  if(!S.typEl){S.typEl=document.createElement('div');S.typEl.className='typ';S.typEl.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';$('msgs').appendChild(S.typEl);scr();}
  S.typTmr=setTimeout(()=>{S.typEl?.remove();S.typEl=null;},2500);
}

// CALL
$('bvc').onclick=()=>startCall('voice');
$('bvd').onclick=()=>startCall('video');
$('bend').onclick=endCall;
$('bmut').onclick=toggleMute;
$('bcam').onclick=toggleCam;
$('bacc').onclick=acceptCall;
$('bdec').onclick=declineCall;

async function startCall(type){
  if(!Object.keys(S.conns).length){toast('No peers connected!');return;}
  S.callType=type;
  try{S.localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:type==='video'});}
  catch(e){toast('Media error: '+e.message);return;}
  if(type==='video'){$('cvids').style.display='grid';$('vloc').srcObject=S.localStream;$('bcam').style.display='';}
  $('cov').classList.add('on');$('cst').textContent='Calling...';
  Object.keys(S.conns).forEach(pid=>{const mc=S.peer.call(pid,S.localStream,{metadata:{type,nick:S.myNick}});setupMC(mc);S.mcalls[pid]=mc;});
}
function handleCall(call){
  $('icnm').textContent=call.metadata?.nick||'Unknown';
  $('ic').classList.add('on');S.pendingCall=call;
}
async function acceptCall(){
  const call=S.pendingCall;if(!call)return;
  $('ic').classList.remove('on');
  const type=call.metadata?.type||'voice';S.callType=type;
  try{S.localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:type==='video'});}
  catch(e){toast('Media error: '+e.message);return;}
  if(type==='video'){$('cvids').style.display='grid';$('vloc').srcObject=S.localStream;$('bcam').style.display='';}
  call.answer(S.localStream);setupMC(call);
  $('cov').classList.add('on');$('cst').textContent='Connected \u25CF';
}
function declineCall(){
  $('ic').classList.remove('on');
  const call=S.pendingCall;
  if(call&&S.conns[call.peer])send(S.conns[call.peer],{type:'call-declined'});
  S.pendingCall=null;
}
function setupMC(mc){
  mc.on('stream',stream=>{$('vrem').srcObject=stream;$('cst').textContent='Connected \u25CF';});
  mc.on('close',endCall);mc.on('error',e=>{console.error(e);endCall();});
}
function endCall(){
  $('cov').classList.remove('on');
  Object.values(S.mcalls).forEach(mc=>{try{mc.close();}catch(e){}});S.mcalls={};
  S.localStream?.getTracks().forEach(t=>t.stop());S.localStream=null;
  $('vloc').srcObject=null;$('vrem').srcObject=null;
  $('cvids').style.display='none';$('bcam').style.display='none';
  S.isMuted=false;S.isCamOff=false;S.callType=null;
}
function toggleMute(){
  S.isMuted=!S.isMuted;
  S.localStream?.getAudioTracks().forEach(t=>t.enabled=!S.isMuted);
  $('bmut').classList.toggle('mut',S.isMuted);
  $('bmut').textContent=S.isMuted?'🔇':'🎤';
}
function toggleCam(){
  S.isCamOff=!S.isCamOff;
  S.localStream?.getVideoTracks().forEach(t=>t.enabled=!S.isCamOff);
  $('bcam').classList.toggle('mut',S.isCamOff);
  $('bcam').textContent=S.isCamOff?'📵':'📷';
}

// LEAVE
$('blv').onclick=()=>{
  Object.values(S.conns).forEach(c=>{try{c.close();}catch(e){}});
  S.conns={};S.peers={};
  try{S.peer?.destroy();}catch(e){}S.peer=null;
  $('room').classList.remove('active');
  $('lobby').style.display='';
  $('msgs').innerHTML='';
};
$('bsb').onclick=()=>$('sb').classList.toggle('col');
$('bsh').onclick=()=>{navigator.clipboard?.writeText(S.roomId).then(()=>toast('Room ID copied!')).catch(()=>toast('ID: '+S.roomId));};
$('cdsp').onclick=()=>navigator.clipboard?.writeText(S.roomId).then(()=>toast('Copied!'));
$('iv').onclick=()=>$('iv').classList.remove('on');
</script>
</body>
</html>
